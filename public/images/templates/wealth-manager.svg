<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f3ff"/>
      <stop offset="100%" stop-color="#dce3ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F6BF6"/>
      <stop offset="100%" stop-color="#3B54D4"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B83FF"/>
      <stop offset="100%" stop-color="#4F6BF6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F6BF6"/>
      <stop offset="100%" stop-color="#3B54D4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)"/>
  <rect x="40" y="40" width="720" height="420" rx="12" fill="white" opacity="0.6"/>
  <!-- Chart -->
  <g transform="translate(400, 195)">
    <!-- Grid lines -->
    <line x1="-110" y1="-80" x2="110" y2="-80" stroke="#4F6BF6" stroke-width="0.5" opacity="0.1"/>
    <line x1="-110" y1="-40" x2="110" y2="-40" stroke="#4F6BF6" stroke-width="0.5" opacity="0.1"/>
    <line x1="-110" y1="0" x2="110" y2="0" stroke="#4F6BF6" stroke-width="0.5" opacity="0.1"/>
    <line x1="-110" y1="40" x2="110" y2="40" stroke="#4F6BF6" stroke-width="0.5" opacity="0.1"/>
    <!-- Bars -->
    <rect x="-100" y="20" width="28" height="60" rx="4" fill="url(#bar1)" opacity="0.5"/>
    <rect x="-60" y="-10" width="28" height="90" rx="4" fill="url(#bar1)" opacity="0.6"/>
    <rect x="-20" y="-30" width="28" height="110" rx="4" fill="url(#bar2)" opacity="0.7"/>
    <rect x="20" y="-55" width="28" height="135" rx="4" fill="url(#bar2)" opacity="0.8"/>
    <rect x="60" y="-80" width="28" height="160" rx="4" fill="url(#accent)" opacity="0.9"/>
    <!-- Trend line -->
    <path d="M-86,15 L-46,-15 L-6,-35 L34,-58 L74,-82" stroke="#FF6B6B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="74" cy="-82" r="4" fill="#FF6B6B"/>
    <!-- Arrow up -->
    <g transform="translate(100, -75)">
      <polygon points="0,-18 8,-6 3,-6 3,8 -3,8 -3,-6 -8,-6" fill="#22C55E" opacity="0.8"/>
    </g>
    <!-- Base line -->
    <line x1="-115" y1="80" x2="115" y2="80" stroke="#4F6BF6" stroke-width="1.5" opacity="0.3"/>
    <!-- Percentage label -->
    <rect x="55" y="-110" width="50" height="22" rx="6" fill="#22C55E" opacity="0.15"/>
    <text x="80" y="-94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22C55E">+24.8%</text>
  </g>
  <!-- Text -->
  <text x="400" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#1a1a2e">Wealth Manager</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#4F6BF6" font-weight="500">Website Template</text>
</svg>