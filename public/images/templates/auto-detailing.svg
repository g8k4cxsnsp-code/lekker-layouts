<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f3ff"/>
      <stop offset="100%" stop-color="#dce3ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F6BF6"/>
      <stop offset="100%" stop-color="#3B54D4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)"/>
  <rect x="40" y="40" width="720" height="420" rx="12" fill="white" opacity="0.6"/>
  <!-- Car body -->
  <g transform="translate(400, 210)">
    <ellipse cx="0" cy="40" rx="120" ry="16" fill="#4F6BF6" opacity="0.08"/>
    <path d="M-90,10 L-70,-30 L-30,-55 L50,-55 L80,-30 L100,10 Z" fill="url(#accent)" opacity="0.9"/>
    <rect x="-100" y="10" width="200" height="35" rx="8" fill="url(#accent)"/>
    <!-- Windows -->
    <path d="M-60,-25 L-30,-48 L0,-48 L0,-5 L-65,-5 Z" fill="#dce3ff" opacity="0.7"/>
    <path d="M5,-48 L45,-48 L70,-25 L70,-5 L5,-5 Z" fill="#dce3ff" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="-55" cy="45" r="20" fill="#2d2d3a"/>
    <circle cx="-55" cy="45" r="10" fill="#888"/>
    <circle cx="-55" cy="45" r="4" fill="#bbb"/>
    <circle cx="60" cy="45" r="20" fill="#2d2d3a"/>
    <circle cx="60" cy="45" r="10" fill="#888"/>
    <circle cx="60" cy="45" r="4" fill="#bbb"/>
    <!-- Headlights -->
    <rect x="90" y="15" width="12" height="10" rx="3" fill="#FFD966" opacity="0.9"/>
    <rect x="-102" y="15" width="8" height="10" rx="3" fill="#FF6B6B" opacity="0.7"/>
    <!-- Sparkle lines -->
    <line x1="-40" y1="-70" x2="-35" y2="-80" stroke="#4F6BF6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-30" y1="-75" x2="-30" y2="-88" stroke="#4F6BF6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="-20" y1="-68" x2="-15" y2="-78" stroke="#4F6BF6" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <circle cx="30" cy="-70" r="3" fill="#4F6BF6" opacity="0.3"/>
    <circle cx="50" cy="-65" r="2" fill="#4F6BF6" opacity="0.2"/>
  </g>
  <!-- Text -->
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#1a1a2e">Auto Detailing</text>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#4F6BF6" font-weight="500">Website Template</text>
</svg>