<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f3ff"/>
      <stop offset="100%" stop-color="#dce3ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F6BF6"/>
      <stop offset="100%" stop-color="#3B54D4"/>
    </linearGradient>
    <linearGradient id="vinyl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d2d3a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)"/>
  <rect x="40" y="40" width="720" height="420" rx="12" fill="white" opacity="0.6"/>
  <!-- Turntable / Music -->
  <g transform="translate(400, 195)">
    <ellipse cx="0" cy="70" rx="100" ry="14" fill="#4F6BF6" opacity="0.08"/>
    <!-- Vinyl record -->
    <circle cx="0" cy="5" r="75" fill="url(#vinyl)"/>
    <circle cx="0" cy="5" r="70" fill="none" stroke="#3a3a4a" stroke-width="0.5" opacity="0.5"/>
    <circle cx="0" cy="5" r="60" fill="none" stroke="#3a3a4a" stroke-width="0.5" opacity="0.4"/>
    <circle cx="0" cy="5" r="50" fill="none" stroke="#3a3a4a" stroke-width="0.5" opacity="0.3"/>
    <circle cx="0" cy="5" r="40" fill="none" stroke="#3a3a4a" stroke-width="0.5" opacity="0.3"/>
    <!-- Record grooves shimmer -->
    <circle cx="0" cy="5" r="65" fill="none" stroke="#4F6BF6" stroke-width="0.3" opacity="0.2"/>
    <circle cx="0" cy="5" r="55" fill="none" stroke="#4F6BF6" stroke-width="0.3" opacity="0.15"/>
    <circle cx="0" cy="5" r="45" fill="none" stroke="#4F6BF6" stroke-width="0.3" opacity="0.1"/>
    <!-- Label -->
    <circle cx="0" cy="5" r="20" fill="url(#accent)"/>
    <circle cx="0" cy="5" r="3" fill="#dce3ff"/>
    <!-- Music notes -->
    <g transform="translate(-95, -55)">
      <circle cx="0" cy="0" r="7" fill="#4F6BF6" opacity="0.4"/>
      <line x1="7" y1="0" x2="7" y2="-30" stroke="#4F6BF6" stroke-width="2.5" opacity="0.4"/>
      <path d="M7,-30 Q15,-35 12,-25" fill="#4F6BF6" opacity="0.4"/>
    </g>
    <g transform="translate(90, -65)">
      <circle cx="0" cy="0" r="6" fill="#4F6BF6" opacity="0.3"/>
      <line x1="6" y1="0" x2="6" y2="-25" stroke="#4F6BF6" stroke-width="2" opacity="0.3"/>
      <path d="M6,-25 Q13,-30 10,-20" fill="#4F6BF6" opacity="0.3"/>
    </g>
    <g transform="translate(110, -35)">
      <circle cx="0" cy="0" r="5" fill="#4F6BF6" opacity="0.2"/>
      <line x1="5" y1="0" x2="5" y2="-20" stroke="#4F6BF6" stroke-width="2" opacity="0.2"/>
      <path d="M5,-20 Q11,-24 8,-16" fill="#4F6BF6" opacity="0.2"/>
    </g>
    <!-- Sound wave arcs -->
    <path d="M-100,-10 Q-108,-10 -108,5 Q-108,20 -100,20" stroke="#4F6BF6" stroke-width="2" fill="none" opacity="0.15"/>
    <path d="M-108,-20 Q-120,-20 -120,5 Q-120,30 -108,30" stroke="#4F6BF6" stroke-width="2" fill="none" opacity="0.1"/>
    <path d="M100,-10 Q108,-10 108,5 Q108,20 100,20" stroke="#4F6BF6" stroke-width="2" fill="none" opacity="0.15"/>
    <path d="M108,-20 Q120,-20 120,5 Q120,30 108,30" stroke="#4F6BF6" stroke-width="2" fill="none" opacity="0.1"/>
  </g>
  <!-- Text -->
  <text x="400" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#1a1a2e">DJ &amp; Entertainment</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#4F6BF6" font-weight="500">Website Template</text>
</svg>