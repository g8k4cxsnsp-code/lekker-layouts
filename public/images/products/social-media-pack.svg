<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f3ff"/>
      <stop offset="100%" stop-color="#dce3ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F6BF6"/>
      <stop offset="100%" stop-color="#3B54D4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <rect x="30" y="30" width="540" height="340" rx="12" fill="white" opacity="0.6"/>
  <!-- Social media cards -->
  <g transform="translate(300, 160)">
    <!-- Card 1 (left, tilted) -->
    <g transform="translate(-70, 0) rotate(-8)">
      <rect x="-45" y="-55" width="90" height="110" rx="10" fill="url(#accent)" opacity="0.7"/>
      <!-- Heart icon -->
      <path d="M-10,-10 C-10,-20 -25,-20 -25,-10 C-25,0 -10,12 -10,12 C-10,12 5,0 5,-10 C5,-20 -10,-20 -10,-10Z" fill="white" opacity="0.8" transform="translate(5, -5)"/>
      <rect x="-35" y="25" width="40" height="4" rx="2" fill="white" opacity="0.4"/>
      <rect x="-35" y="35" width="25" height="4" rx="2" fill="white" opacity="0.3"/>
    </g>
    <!-- Card 2 (center, front) -->
    <g transform="translate(0, -10)">
      <rect x="-50" y="-60" width="100" height="120" rx="10" fill="url(#accent)" opacity="0.9"/>
      <!-- Chat bubble icon -->
      <rect x="-25" y="-30" width="50" height="35" rx="8" fill="white" opacity="0.8"/>
      <polygon points="-10,5 -5,15 5,5" fill="white" opacity="0.8"/>
      <rect x="-15" y="-20" width="30" height="3" rx="1.5" fill="#4F6BF6" opacity="0.4"/>
      <rect x="-15" y="-13" width="20" height="3" rx="1.5" fill="#4F6BF6" opacity="0.3"/>
      <rect x="-40" y="30" width="45" height="4" rx="2" fill="white" opacity="0.4"/>
      <rect x="-40" y="40" width="30" height="4" rx="2" fill="white" opacity="0.3"/>
    </g>
    <!-- Card 3 (right, tilted) -->
    <g transform="translate(70, 0) rotate(8)">
      <rect x="-45" y="-55" width="90" height="110" rx="10" fill="url(#accent)" opacity="0.7"/>
      <!-- Share/send icon -->
      <polygon points="-5,-15 15,0 -5,15 -5,5 -15,5 -15,-5 -5,-5" fill="white" opacity="0.8" transform="translate(-3, -5)"/>
      <rect x="-35" y="25" width="40" height="4" rx="2" fill="white" opacity="0.4"/>
      <rect x="-35" y="35" width="25" height="4" rx="2" fill="white" opacity="0.3"/>
    </g>
    <!-- Decorative dots -->
    <circle cx="-120" cy="-40" r="4" fill="#4F6BF6" opacity="0.15"/>
    <circle cx="125" cy="-50" r="3" fill="#4F6BF6" opacity="0.1"/>
    <circle cx="-110" cy="50" r="3" fill="#4F6BF6" opacity="0.1"/>
    <circle cx="115" cy="40" r="5" fill="#4F6BF6" opacity="0.12"/>
  </g>
  <!-- Text -->
  <text x="300" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1a1a2e">Social Media Pack</text>
  <text x="300" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4F6BF6" font-weight="500">Digital Product</text>
</svg>