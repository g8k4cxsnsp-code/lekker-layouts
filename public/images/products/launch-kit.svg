<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#0F172A"/>
  <!-- Stacked documents to represent bundle -->
  <!-- Back doc -->
  <rect x="100" y="60" width="220" height="280" rx="12" fill="#1E293B" opacity="0.5"/>
  <!-- Middle doc -->
  <rect x="85" y="50" width="220" height="280" rx="12" fill="#1E293B" opacity="0.7"/>
  <!-- Front doc -->
  <rect x="70" y="40" width="220" height="280" rx="12" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
  <!-- Star/bundle badge -->
  <circle cx="280" cy="80" r="32" fill="#3B82F6"/>
  <text x="280" y="76" text-anchor="middle" fill="white" font-family="sans-serif" font-size="10" font-weight="bold">SAVE</text>
  <text x="280" y="90" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">R248</text>
  <!-- Content lines -->
  <rect x="100" y="70" width="100" height="12" rx="6" fill="#3B82F6"/>
  <rect x="100" y="96" width="160" height="8" rx="4" fill="#334155"/>
  <rect x="100" y="112" width="140" height="8" rx="4" fill="#334155"/>
  <!-- Checklist items -->
  <circle cx="112" cy="148" r="8" fill="#3B82F6" opacity="0.2"/>
  <path d="M108 148l3 3 5-5" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="128" y="144" width="130" height="8" rx="4" fill="#334155"/>
  <circle cx="112" cy="172" r="8" fill="#3B82F6" opacity="0.2"/>
  <path d="M108 172l3 3 5-5" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="128" y="168" width="120" height="8" rx="4" fill="#334155"/>
  <circle cx="112" cy="196" r="8" fill="#3B82F6" opacity="0.2"/>
  <path d="M108 196l3 3 5-5" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="128" y="192" width="140" height="8" rx="4" fill="#334155"/>
  <circle cx="112" cy="220" r="8" fill="#3B82F6" opacity="0.2"/>
  <path d="M108 220l3 3 5-5" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="128" y="216" width="110" height="8" rx="4" fill="#334155"/>
  <!-- CTA -->
  <rect x="100" y="252" width="80" height="10" rx="5" fill="#3B82F6"/>
  <rect x="100" y="274" width="160" height="6" rx="3" fill="#334155"/>
  <rect x="100" y="288" width="140" height="6" rx="3" fill="#334155"/>
</svg>
