<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f3ff"/>
      <stop offset="100%" stop-color="#dce3ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F6BF6"/>
      <stop offset="100%" stop-color="#3B54D4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <rect x="30" y="30" width="540" height="340" rx="12" fill="white" opacity="0.6"/>
  <!-- Document / Checklist -->
  <g transform="translate(300, 155)">
    <ellipse cx="0" cy="85" rx="70" ry="10" fill="#4F6BF6" opacity="0.06"/>
    <!-- Paper shadow -->
    <rect x="-52" y="-68" width="110" height="145" rx="8" fill="#3B54D4" opacity="0.08" transform="translate(4, 4)"/>
    <!-- Paper -->
    <rect x="-55" y="-72" width="110" height="145" rx="8" fill="white" stroke="#4F6BF6" stroke-width="1.5" opacity="0.9"/>
    <!-- Header bar -->
    <rect x="-45" y="-62" width="90" height="18" rx="4" fill="url(#accent)" opacity="0.15"/>
    <rect x="-38" y="-56" width="40" height="6" rx="2" fill="#4F6BF6" opacity="0.4"/>
    <!-- Checklist items -->
    <!-- Item 1 - checked -->
    <rect x="-40" y="-32" width="14" height="14" rx="3" fill="#4F6BF6" opacity="0.8"/>
    <polyline points="-36,-25 -33,-22 -29,-28" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-20" y="-30" width="55" height="5" rx="2" fill="#1a1a2e" opacity="0.15"/>
    <rect x="-20" y="-22" width="35" height="4" rx="2" fill="#1a1a2e" opacity="0.1"/>
    <!-- Item 2 - checked -->
    <rect x="-40" y="-6" width="14" height="14" rx="3" fill="#4F6BF6" opacity="0.8"/>
    <polyline points="-36,1 -33,4 -29,-2" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-20" y="-4" width="50" height="5" rx="2" fill="#1a1a2e" opacity="0.15"/>
    <rect x="-20" y="4" width="30" height="4" rx="2" fill="#1a1a2e" opacity="0.1"/>
    <!-- Item 3 - unchecked -->
    <rect x="-40" y="20" width="14" height="14" rx="3" fill="none" stroke="#4F6BF6" stroke-width="1.5" opacity="0.4"/>
    <rect x="-20" y="22" width="45" height="5" rx="2" fill="#1a1a2e" opacity="0.1"/>
    <rect x="-20" y="30" width="30" height="4" rx="2" fill="#1a1a2e" opacity="0.07"/>
    <!-- Item 4 - unchecked -->
    <rect x="-40" y="44" width="14" height="14" rx="3" fill="none" stroke="#4F6BF6" stroke-width="1.5" opacity="0.4"/>
    <rect x="-20" y="46" width="40" height="5" rx="2" fill="#1a1a2e" opacity="0.1"/>
    <rect x="-20" y="54" width="25" height="4" rx="2" fill="#1a1a2e" opacity="0.07"/>
    <!-- Pencil -->
    <g transform="translate(70, -30) rotate(25)">
      <rect x="-3" y="-40" width="6" height="50" rx="1" fill="#FFD966"/>
      <polygon points="-3,10 3,10 0,18" fill="#F5C542"/>
      <rect x="-3" y="-40" width="6" height="8" rx="1" fill="#FF6B6B" opacity="0.7"/>
      <polygon points="-2,15 2,15 0,19" fill="#333"/>
    </g>
    <!-- Calendar mini icon -->
    <g transform="translate(-80, -50)">
      <rect x="-14" y="-12" width="28" height="24" rx="4" fill="#4F6BF6" opacity="0.2"/>
      <rect x="-14" y="-12" width="28" height="8" rx="4" fill="#4F6BF6" opacity="0.3"/>
      <circle cx="-5" cy="4" r="2" fill="#4F6BF6" opacity="0.3"/>
      <circle cx="5" cy="4" r="2" fill="#4F6BF6" opacity="0.3"/>
    </g>
  </g>
  <!-- Text -->
  <text x="300" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1a1a2e">Content Planner</text>
  <text x="300" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4F6BF6" font-weight="500">Digital Product</text>
</svg>