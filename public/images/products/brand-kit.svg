<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f3ff"/>
      <stop offset="100%" stop-color="#dce3ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F6BF6"/>
      <stop offset="100%" stop-color="#3B54D4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <rect x="30" y="30" width="540" height="340" rx="12" fill="white" opacity="0.6"/>
  <!-- Palette icon -->
  <g transform="translate(300, 155)">
    <ellipse cx="0" cy="70" rx="80" ry="12" fill="#4F6BF6" opacity="0.06"/>
    <!-- Palette shape -->
    <path d="M0,-70 C45,-70 80,-45 85,-5 C90,35 65,65 25,70 C15,72 5,65 5,55 C5,40 20,35 20,25 C20,15 10,10 0,10 C-45,10 -80,-15 -85,-35 C-90,-55 -45,-70 0,-70Z" fill="url(#accent)" opacity="0.85"/>
    <!-- Color dots on palette -->
    <circle cx="-40" cy="-35" r="12" fill="#FF6B6B" opacity="0.9"/>
    <circle cx="-10" cy="-50" r="12" fill="#FFD966" opacity="0.9"/>
    <circle cx="30" cy="-40" r="12" fill="#22C55E" opacity="0.9"/>
    <circle cx="50" cy="-10" r="12" fill="#FF9F43" opacity="0.9"/>
    <circle cx="40" cy="25" r="12" fill="#A78BFA" opacity="0.9"/>
    <!-- Thumb hole -->
    <circle cx="5" cy="35" r="14" fill="#dce3ff" opacity="0.6"/>
    <!-- Brush -->
    <g transform="translate(65, -55) rotate(35)">
      <rect x="-4" y="-45" width="8" height="35" rx="3" fill="#8B6F47"/>
      <rect x="-3" y="-48" width="6" height="8" rx="2" fill="#C4A673"/>
      <rect x="-6" y="-10" width="12" height="18" rx="2" fill="#4F6BF6" opacity="0.7"/>
      <rect x="-5" y="5" width="10" height="5" rx="1" fill="#3B54D4" opacity="0.5"/>
    </g>
    <!-- Typography hint -->
    <text x="-45" y="-5" font-family="Georgia, serif" font-size="18" font-weight="700" fill="white" opacity="0.5">Aa</text>
  </g>
  <!-- Text -->
  <text x="300" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1a1a2e">Brand Identity Kit</text>
  <text x="300" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4F6BF6" font-weight="500">Digital Product</text>
</svg>