<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f3ff"/>
      <stop offset="100%" stop-color="#dce3ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F6BF6"/>
      <stop offset="100%" stop-color="#3B54D4"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD966"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <rect x="30" y="30" width="540" height="340" rx="12" fill="white" opacity="0.6"/>
  <!-- Rocket -->
  <g transform="translate(300, 165)">
    <!-- Exhaust cloud -->
    <ellipse cx="-5" cy="85" rx="30" ry="10" fill="#4F6BF6" opacity="0.06"/>
    <circle cx="-15" cy="75" r="10" fill="#dce3ff" opacity="0.4"/>
    <circle cx="5" cy="80" r="12" fill="#dce3ff" opacity="0.3"/>
    <circle cx="15" cy="75" r="8" fill="#dce3ff" opacity="0.3"/>
    <circle cx="-8" cy="82" r="14" fill="#dce3ff" opacity="0.25"/>
    <!-- Flame -->
    <path d="M-12,55 Q-15,70 -5,85 Q0,72 5,85 Q15,70 12,55 Z" fill="url(#flame)" opacity="0.8"/>
    <path d="M-6,55 Q-8,68 0,78 Q8,68 6,55 Z" fill="#FFD966" opacity="0.9"/>
    <!-- Rocket body -->
    <path d="M0,-75 C-8,-70 -20,-30 -20,30 L-20,55 L20,55 L20,30 C20,-30 8,-70 0,-75Z" fill="url(#accent)"/>
    <!-- Nose cone highlight -->
    <path d="M0,-75 C-4,-70 -12,-40 -14,-10 L-8,-10 C-6,-40 -2,-65 0,-70Z" fill="white" opacity="0.15"/>
    <!-- Window -->
    <circle cx="0" cy="-15" r="14" fill="#1a1a2e" opacity="0.6"/>
    <circle cx="0" cy="-15" r="11" fill="#6B83FF" opacity="0.4"/>
    <ellipse cx="-3" cy="-18" rx="4" ry="6" fill="white" opacity="0.2" transform="rotate(-15)"/>
    <!-- Fins -->
    <path d="M-20,30 L-38,58 L-20,50 Z" fill="#3B54D4"/>
    <path d="M20,30 L38,58 L20,50 Z" fill="#3B54D4"/>
    <!-- Body stripe -->
    <rect x="-20" y="20" width="40" height="6" fill="white" opacity="0.2"/>
    <!-- Stars -->
    <g opacity="0.3" fill="#4F6BF6">
      <circle cx="-70" cy="-50" r="2.5"/>
      <circle cx="75" cy="-40" r="2"/>
      <circle cx="-80" cy="10" r="1.5"/>
      <circle cx="85" cy="0" r="3"/>
      <circle cx="-60" cy="-20" r="1.5"/>
      <circle cx="60" cy="-60" r="2"/>
      <circle cx="-90" cy="-30" r="2"/>
      <circle cx="95" cy="-20" r="1.5"/>
    </g>
    <!-- Sparkle trails -->
    <line x1="-55" y1="-45" x2="-65" y2="-55" stroke="#4F6BF6" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    <line x1="65" y1="-35" x2="75" y2="-45" stroke="#4F6BF6" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  </g>
  <!-- Text -->
  <text x="300" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1a1a2e">Launch Bundle</text>
  <text x="300" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4F6BF6" font-weight="500">Digital Product</text>
</svg>